<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford</title>    
    <link href="css/reset.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/form.css" rel="stylesheet">
    <script src="js/form.js"></script>
</head>
<body>
    <header>       
        <div>
            <img src="img/logo-ford-256.png" width="150" class="logo" alt="Logo Ford" />
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="lancamento.html">Lançamento</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
       <main>
        <div class="forms">
            <div>
                <img src="img/xls 2.2 diesel.jpg" alt="Ford Ranger XLS 2.2 Diesel">
            </div>
            <div>
                <h2 class="titulo">Sobre Você</h2>
                <!-- Adicionado return false para o JS tratar o envio sem recarregar a página -->
                <form onsubmit="Post(this); return false;">
                    <input type="text" name="nome" placeholder="NOME*" class="fordform" required>
                    <!-- Alterado para type="email" para validação nativa do navegador -->
                    <input type="email" name="email" placeholder="E-MAIL*" class="fordform" required>
                    <!-- Alterado para type="tel" para melhor usabilidade mobile -->
                    <input type="tel" name="telefone" placeholder="TELEFONE*" class="fordform" required>
                    
                    <select name="contato" class="fordform" required>
                        <!-- Adicionado value="" e disabled para obrigar a escolha de uma opção válida -->
                        <option value="" disabled selected>TIPO DE CONTATO</option>
                        <option value="elogio">ELOGIO</option>
                        <option value="reclamacao">RECLAMAÇÃO</option>
                        <option value="solicitacao">SOLICITAÇÃO</option>
                    </select>
                       
                    <P class="textoPragrafo">Os dados serão mantidos em nossa base de dados, só enquanto for desejado por você. A 
                    qualquer momento, será possível editar ou remover tais dados. <a href="https://www.ford.com.br/politica-de-privacidade/" target="_blank">Termos e Condições</a></P>
                     
                    <div>

                    <div class="checkbox_item">
                        <input type="checkbox" id="checkbox_1">
                        <label for="checkbox_1">Sim. Li e concordo com os Termos e Condições.</label>
                        
                    </div>

                    <div class="checkbox_item">
                        <input type="checkbox" id="checkbox_2">
                        <label for="checkbox_2">Sim. Também quero receber descontos e novidades.</label>

                    </div>


                     </div>

                    <!-- Padronizado o name para minúsculo (mensagem) -->
                   
                    <button id="btn_enviar" class="btn">Enviar</button>
                </form>
             
            </div>
        </div>
    </main>
    
    <footer>
        <nav id="social">
            <ul>
                <li><span class="redesociais">Redes Sociais</span></li>
                <li><a href="#" title="Facebook"><img src="img/facebook-50.png" alt="Facebook"></a></li>
                <li><a href="#" title="YouTube"><img src="img/youtube-squared-50.png" alt="YouTube"></a></li>
                <li><a href="#" title="Instagram"><img src="img/instagram-logo-50.png" alt="Instagram"></a></li>
            </ul>
        </nav>
        <div>
           <img src="img/ford-96.png" width="75" alt="Logo Ford Rodapé" />
        </div>
    </footer>    
</body>
</html>
